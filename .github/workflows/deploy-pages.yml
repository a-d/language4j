# GitHub Pages Deployment Workflow
# ================================
# Deploys the frontend with demo data to GitHub Pages.
# 
# Trigger: Push to main branch (frontend changes only) or manual dispatch.
# 
# The workflow:
# 1. Checks out the code
# 2. Creates a modified config.js with FORCE_DEMO_MODE=true
# 3. Deploys the frontend folder to GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:  # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Enable Demo Mode for Static Deployment
        run: |
          # Update config.js to force demo mode
          sed -i 's/FORCE_DEMO_MODE: false/FORCE_DEMO_MODE: true/' frontend/js/config.js
          echo "Updated config.js to enable demo mode:"
          cat frontend/js/config.js
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4