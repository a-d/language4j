# Language Learning Platform Configuration
# =========================================

# Dotenv Configuration - look for .env in project root (parent of backend folder)
env:
  directory: ../..
  filename: .env
  ignore-missing: true

spring:
  application:
    name: language-learning

  # Database Configuration
  datasource:
    url: ${env.DATABASE_URL:jdbc:postgresql://localhost:5433/language_learning}
    username: ${env.DATABASE_USERNAME:postgres}
    password: ${env.DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # Flyway Database Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# Language Learning Configuration
language-learning:
  language:
    native-code: ${NATIVE_LANGUAGE:de}
    target-code: ${TARGET_LANGUAGE:fr}

  storage:
    content-path: ${CONTENT_PATH:./content}
    media-path: ${MEDIA_PATH:./media}
    templates-path: ${TEMPLATES_PATH:./content/templates}

  ai:
    llm:
      provider: ${LLM_PROVIDER:openai}
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:}
      model: ${LLM_MODEL:gpt-4-turbo-preview}
      temperature: ${LLM_TEMPERATURE:0.7}
      max-tokens: ${LLM_MAX_TOKENS:4096}
      timeout: ${LLM_TIMEOUT:60s}
      max-retries: ${LLM_MAX_RETRIES:3}

    speech-to-text:
      provider: ${STT_PROVIDER:openai}
      api-key: ${STT_API_KEY:${LLM_API_KEY:}}
      base-url: ${STT_BASE_URL:}
      model: ${STT_MODEL:whisper-1}

    text-to-speech:
      provider: ${TTS_PROVIDER:openai}
      api-key: ${TTS_API_KEY:${LLM_API_KEY:}}
      base-url: ${TTS_BASE_URL:}
      model: ${TTS_MODEL:tts-1}
      voice: ${TTS_VOICE:alloy}
      speed: ${TTS_SPEED:1.0}

    image:
      provider: ${IMAGE_PROVIDER:openai}
      api-key: ${IMAGE_API_KEY:${LLM_API_KEY:}}
      base-url: ${IMAGE_BASE_URL:}
      model: ${IMAGE_MODEL:dall-e-3}
      size: ${IMAGE_SIZE:1024x1024}
      quality: ${IMAGE_QUALITY:standard}

# Spring AI Configuration
spring.ai:
  # OpenAI configuration (only used when LLM_PROVIDER=openai)
  openai:
    api-key: ${OPENAI_API_KEY:${LLM_API_KEY:placeholder-key-not-used}}
    base-url: ${OPENAI_BASE_URL:${LLM_BASE_URL:https://api.openai.com}}
    chat:
      enabled: ${OPENAI_CHAT_ENABLED:false}
      options:
        model: ${LLM_MODEL:gpt-4-turbo-preview}
        temperature: ${LLM_TEMPERATURE:0.7}
    image:
      enabled: ${OPENAI_IMAGE_ENABLED:false}
    audio:
      speech:
        enabled: ${OPENAI_SPEECH_ENABLED:false}
      transcription:
        enabled: ${OPENAI_TRANSCRIPTION_ENABLED:false}

  # Anthropic configuration (only used when LLM_PROVIDER=anthropic)
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder-key-not-used}
    chat:
      enabled: ${ANTHROPIC_CHAT_ENABLED:false}
      options:
        model: ${ANTHROPIC_MODEL:claude-3-sonnet-20240229}
        temperature: ${LLM_TEMPERATURE:0.7}

  # Ollama configuration (default local provider)
  ollama:
    base-url: ${OLLAMA_BASE_URL:${LLM_BASE_URL:http://localhost:11434}}
    chat:
      enabled: ${OLLAMA_CHAT_ENABLED:true}
      options:
        model: ${LLM_MODEL:qwen2.5:7b-instruct-q5_K_M}
        temperature: ${LLM_TEMPERATURE:0.7}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# Logging Configuration
logging:
  level:
    root: INFO
    dev.languagelearning: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

  h2:
    console:
      enabled: true

logging:
  level:
    dev.languagelearning: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    dev.languagelearning: INFO